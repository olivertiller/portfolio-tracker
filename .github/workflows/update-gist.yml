name: Daily portfolio report

on:
  schedule:
    # 22:15 Oslo time (winter CET = UTC+1, summer CEST = UTC+2)
    - cron: "15 21 * * 1-5"  # Winter: 21:15 UTC = 22:15 CET
    - cron: "15 20 * * 1-5"  # Summer: 20:15 UTC = 22:15 CEST
  workflow_dispatch: # Allow manual trigger

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Check Oslo time is 22:xx (skip wrong DST trigger)
        if: github.event_name == 'schedule'
        run: |
          OSLO_HOUR=$(TZ='Europe/Oslo' date +%H)
          echo "Current hour in Oslo: $OSLO_HOUR"
          if [ "$OSLO_HOUR" != "22" ]; then
            echo "Not 22:xx in Oslo — wrong DST trigger, skipping."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance anthropic requests

      - name: Fetch movers and update gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: "24236a25d105c46c64f122e4d60e12d6"
        run: python scripts/update_gist.py

      - name: Generate report and send notification
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/generate_report.py
