name: Daily portfolio report

on:
  workflow_dispatch:
    inputs:
      portfolio:
        description: "Portfolio to generate report for"
        required: true
        default: "private"
        type: choice
        options:
          - private
          - pmax

jobs:
  report:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance anthropic requests

      - name: Fetch movers and update gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: "24236a25d105c46c64f122e4d60e12d6"
        run: python scripts/update_gist.py --portfolio ${{ inputs.portfolio }}

      - name: Generate report and publish
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: "24236a25d105c46c64f122e4d60e12d6"
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          API_URL: ${{ secrets.API_URL }}
          API_SECRET: ${{ secrets.API_SECRET }}
        run: python scripts/generate_report.py --portfolio ${{ inputs.portfolio }}

      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PORTFOLIO: ${{ inputs.portfolio }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --title "Daily report failed: $PORTFOLIO ($(date -u +%Y-%m-%d))" \
            --body "Workflow run failed for portfolio **$PORTFOLIO**.

          Run: $RUN_URL

          @claude please investigate the failure and open a fix PR if applicable."
