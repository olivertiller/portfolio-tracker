name: Daily portfolio report

on:
  workflow_dispatch: # Triggered by cron-job.org at 22:15 Oslo time

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance anthropic requests

      - name: Fetch movers and update gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
          GIST_ID: "24236a25d105c46c64f122e4d60e12d6"
        run: python scripts/update_gist.py

      - name: Generate report and send notification
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: python scripts/generate_report.py
